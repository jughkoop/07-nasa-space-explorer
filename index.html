<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Explore NASA's Astronomy Picture of the Day collection by date range and discover beautiful space images with details." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#061f4a" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>

  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <main id="mainContent">
      <section aria-labelledby="filterHeading">
        <h2 id="filterHeading" class="sr-only">Choose a date range</h2>
        <div class="filters">
          <div class="field-group">
            <label for="startDate">Start date</label>
            <input type="date" id="startDate" />
          </div>
          <div class="field-group">
            <label for="endDate">End date</label>
            <input type="date" id="endDate" />
          </div>
          <div class="button-group">
            <button id="getImagesBtn" type="button">Get Space Images</button>
            <button id="surpriseBtn" type="button" class="secondary-button">Surprise Me</button>
          </div>
        </div>
      </section>

      <section aria-labelledby="galleryHeading">
        <h2 id="galleryHeading" class="sr-only">Space image results</h2>
        <p id="statusMessage" class="status-message sr-only" role="status" aria-live="polite"></p>
        <div id="gallery" class="gallery" aria-live="polite" aria-busy="false">
          <div class="placeholder">
            <div class="placeholder-icon">🔭</div>
            <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
          </div>
        </div>
      </section>

      <noscript>
        <p class="status-message">This site needs JavaScript to load NASA images.</p>
      </noscript>
    </main>

    <footer class="site-footer">
      <p>Images and data provided by NASA APOD.</p>
    </footer>
  </div>

  <!-- Modal window for displaying full image details -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalExplanation" aria-hidden="true">
    <div class="modal-content">
      <!-- Close button for the modal -->
      <button id="closeModalBtn" class="close-btn" type="button" aria-label="Close image details">&times;</button>

      <!-- Large image -->
      <img id="modalImage" src="" alt="" class="modal-image" />

      <!-- Image details -->
      <div class="modal-details">
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
